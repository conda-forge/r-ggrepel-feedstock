{% set version = "0.9.7" %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-ggrepel
  version: {{ version|replace("-", "_") }}

source:
  url:
    - {{ cran_mirror }}/src/contrib/ggrepel_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/ggrepel/ggrepel_{{ version }}.tar.gz
  sha256: 6d51e597ff7a583dacae331be711703169f0e9988926f381ce25636c3a12c237

build:
  number: 0
  rpaths:
    - lib/R/lib/
    - lib/
  missing_dso_whitelist:
    - '*/R.dll'        # [win]
    - '*/Rblas.dll'    # [win]
    - '*/Rlapack.dll'  # [win]

requirements:
  build:
    - cross-r-base {{ r_base }}  # [build_platform != target_platform]
    - r-rcpp                     # [build_platform != target_platform]
    - r-s7                       # [build_platform != target_platform]
    - r-ggplot2                  # [build_platform != target_platform]
    - r-rlang                    # [build_platform != target_platform]
    - r-scales                   # [build_platform != target_platform]
    - r-withr                    # [build_platform != target_platform]
    - {{ compiler('c') }}              # [not win]
    - {{ stdlib("c") }}                # [not win]
    - {{ compiler('m2w64_c') }}        # [win]
    - {{ stdlib("m2w64_c") }}          # [win]
    - {{ compiler('cxx') }}            # [not win]
    - {{ compiler('m2w64_cxx') }}      # [win]
    - {{ posix }}filesystem        # [win]
    - {{ posix }}make
    - {{ posix }}sed               # [win]
    - {{ posix }}coreutils         # [win]
    - {{ posix }}zip               # [win]
  host:
    - r-base >=4.5
    - r-rcpp
    - r-s7
    - r-ggplot2 >=3.5.2
    - r-rlang >=1.1.6
    - r-scales >=1.4.0
    - r-withr >=3.0.2
  run:
    - r-base >=4.5
    - r-rcpp
    - r-s7
    - r-ggplot2 >=3.5.2
    - r-rlang >=1.1.6
    - r-scales >=1.4.0
    - r-withr >=3.0.2

test:
  commands:
    - $R -e "library('ggrepel')"           # [not win]
    - "\"%R%\" -e \"library('ggrepel')\""  # [win]

about:
  home: http://github.com/slowkow/ggrepel
  dev_url: https://github.com/slowkow/ggrepel
  license: GPL-3.0-only
  summary: Provides text and label geoms for 'ggplot2' that help to avoid overlapping text labels. Labels repel away from each other and away from the data points.
  license_family: GPL3
  license_file:
    - {{ environ["PREFIX"] }}/lib/R/share/licenses/GPL-3
    - LICENSE

extra:
  recipe-maintainers:
    - conda-forge/r
